<div class="nf-app-shell">

  <!-- ── Sidebar ── -->
  <aside class="nf-sidebar">

    <!-- Logo -->
    <div class="nf-sidebar__logo">
      <div class="nf-logo-icon">
        <span class="material-icons-round" style="font-size: 20px; color: white;">bolt</span>
      </div>
      <div class="nf-logo-text">
        <span class="nf-logo-title">NexFlow</span>
        <span class="nf-logo-subtitle">ERP Command</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="nf-sidebar__nav">
      @for (item of visibleNav(); track item.path) {
        <a [routerLink]="item.path"
           routerLinkActive="nf-nav-item--active"
           [routerLinkActiveOptions]="{exact: item.path === '/dashboard'}"
           class="nf-nav-item">
          <span class="material-icons-round nf-nav-item__icon">{{ item.icon }}</span>
          <span class="nf-nav-item__label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- System Status Indicator -->
    <div class="nf-sidebar__status">
      <div class="nf-status-dot"></div>
      <span class="nf-status-text">System Online</span>
    </div>

    <!-- User -->
    <div class="nf-sidebar__user">
      <div class="nf-user-avatar">
        {{ userInitial }}
      </div>
      <div class="nf-user-info">
        <p class="nf-user-name">{{ auth.username() }}</p>
        <p class="nf-user-role">{{ auth.roles()[0] }}</p>
      </div>
      <button (click)="auth.logout()" class="nf-logout-btn" title="Sign out">
        <span class="material-icons-round" style="font-size: 18px;">logout</span>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="nf-main">

    <!-- Topbar -->
    <header class="nf-topbar">
      <div class="nf-topbar__left">
        <h1 class="nf-page-title">{{ pageTitle() }}</h1>
      </div>
      <div class="nf-topbar__right">
        @for (role of auth.roles().slice(0, 2); track role) {
          <app-badge [value]="role" />
        }
      </div>
    </header>

    <!-- Content -->
    <main class="nf-content">
      <router-outlet />
    </main>
  </div>
</div>

<app-toast />
