# Application configuration
spring.application.name=demo
server.port=9090
# Database configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/distributioncompany?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect (Automatic detection)
spring.jpa.properties.hibernate.format_sql=true
# Keycloak / OAuth2 Resource Server Configuration
# Replace "localhost:8095" with your Keycloak server host
# Replace "demo-realm" with your Keycloak realm name
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8095/realms/demo-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8095/realms/demo-realm/protocol/openid-connect/certs

# Keycloak Admin API (for user provisioning)
keycloak.server-url=http://localhost:8095
keycloak.realm=demo-realm
keycloak.admin-client-id=admin-cli
keycloak.admin-username=admin
keycloak.admin-password=admin
